<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Box and Button</title>
  <script src="https://cdn.jsdelivr.net/npm/darkyjs@1.2.1/darky.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f4f4f4;
    }

    .container {
      width: 90%;
      max-width: 600px;
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 200px;
      font-size: 16px;
      padding: 10px;
      resize: none;
      box-sizing: border-box;
    }

    #imageInput {
      margin-top: 12px;
      width: 100%;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
    }

    button:hover {
      background-color: #45a049;
    }

    p {
      overflow-wrap: break-word;
    }

    #uploadStatus {
      margin-top: 12px;
      min-height: 1.25rem;
      font-size: 14px;
    }

    progress {
      margin-top: 10px;
      width: 100%;
      display: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <p id="taglist">Tags: </p>
    <textarea id="textbox" placeholder="Enter text here..."></textarea>
    <input id="imageInput" type="file" accept="image/*">
    <progress id="uploadProgress" value="0" max="100"></progress>
    <p id="uploadStatus" aria-live="polite"></p>
    <br>
    <button id="submitBtn">Submit</button>
  </div>

  <script>
    const darkmode = new Darky();
    darkmode.enable();

    let click_waiting = false;
    const MAX_IMAGE_SIZE_BYTES = 5 * 1024 * 1024;

    function updateUploadStatus(message, isError = false) {
      const uploadStatus = document.getElementById('uploadStatus');
      uploadStatus.textContent = message;
      uploadStatus.style.color = isError ? '#d93025' : '';
    }

    document.getElementById('submitBtn').addEventListener('click', function () {
      if (click_waiting) {
        return;
      }

      const textbox = document.getElementById('textbox');
      const imageInput = document.getElementById('imageInput');
      const uploadProgress = document.getElementById('uploadProgress');
      const submitBtn = document.getElementById('submitBtn');
      const imageFile = imageInput.files[0];

      if (!imageFile) {
        updateUploadStatus('Please choose an image before submitting.', true);
        imageInput.focus();
        return;
      }

      if (imageFile.size > MAX_IMAGE_SIZE_BYTES) {
        const maxSizeMb = Math.floor(MAX_IMAGE_SIZE_BYTES / (1024 * 1024));
        updateUploadStatus(`Image is too large. Maximum allowed size is ${maxSizeMb}MB.`, true);
        imageInput.focus();
        return;
      }

      textbox.focus();
      textbox.scrollIntoView();
      click_waiting = true;
      submitBtn.disabled = true;
      uploadProgress.style.display = 'block';
      uploadProgress.value = 0;
      updateUploadStatus('Uploading...');

      const formData = new FormData();
      formData.append('text', textbox.value);
      formData.append('image', imageFile);

      const request = new XMLHttpRequest();
      request.open('POST', '/');

      request.upload.addEventListener('progress', (event) => {
        if (!event.lengthComputable) {
          return;
        }

        const progressPercent = Math.round((event.loaded / event.total) * 100);
        uploadProgress.value = progressPercent;
        updateUploadStatus(`Uploading... ${progressPercent}%`);
      });

      request.addEventListener('load', () => {
        if (request.status >= 200 && request.status < 300) {
          console.log('Success:', request.responseText);
          updateUploadStatus('Content and image uploaded successfully.');
          uploadProgress.value = 100;

          textbox.value = '';
          imageInput.value = '';
          textbox.focus();
          textbox.scrollIntoView();
        } else {
          updateUploadStatus(`Upload failed (${request.status}). Please try again.`, true);
        }

        click_waiting = false;
        submitBtn.disabled = false;
      });

      request.addEventListener('error', () => {
        console.error('Error:', request.statusText);
        updateUploadStatus('An error occurred while uploading. Please check your connection and try again.', true);
        click_waiting = false;
        submitBtn.disabled = false;
      });

      request.send(formData);
    });

    <!-- Get tags list -->
    fetch("/tags", {method: "GET"})
      .then(response => response.text())
      .then(data => {
        document.getElementById("taglist").innerText = "Tags: " + data;
      });
  </script>

</body>

</html>
